<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .text-container{
                         display: flex;
                         align-items: center;
                         justify-content: center;
                         font-family: sans-serif;
                         letter-spacing: 4px;
                         font-size: 70px;
                         font-weight:800;
                         perspective: 80px;
        }
        /* css child selector */
        .text-container>b{
                      box-shadow: 0px 20px 10px gray;  
                      background:linear-gradient(to right,yellow,rgb(255, 102, 0));
                      background-clip: text;
                      color: transparent;
                      transform-origin: bottom;
                      transform: rotateX(-85deg); 
                      animation: getUpDown 10s infinite;  
        }
        .text-container>b:nth-child(1){
            animation-delay: 0s;
        }
        .text-container>b:nth-child(2){
            animation-delay: 0.25s;
        }
        .text-container>b:nth-child(3){
            animation-delay: 0.50s;
        }
        .text-container>b:nth-child(4){
            animation-delay: 0.75s;
        }
        .text-container>b:nth-child(5){
            animation-delay: 1s;
        }
        .text-container>b:nth-child(6){
            animation-delay: 1.25s;
        }
        @keyframes getUpDown{
            from{transform:rotateX(-85deg);}
            10%,50%{transform:rotateX(0);}
            60%,to{transform: rotateX(-85deg);}
        }
    </style>
</head>
<body>
       <div class="text-container">
        <b>R</b><b>U</b><b>T</b><b>U</b><b>J</b><b>A</b>
       </div>
</body>
</html>
