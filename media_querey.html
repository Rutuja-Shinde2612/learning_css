<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*  mobile view */
        @media only screen and (min-width:320px) and (max-width:767px){
            body{
                     background-color:pink;            
            }
            h1{
                  color:red;
            }
            .img1{
                    height: 100px;
                    width: 200px;
            }
        }

        /* from 768px and up */
        
            @media (min-width:786px)
            {
                body
                {
                background-color: rgb(154, 122, 185);

                }
            .img1{
                border-radius: 10px;
            }
        }
/* From 1024 and up */
        @media (min-width:1024px)
        {
            body{
                  background-color: rgb(48, 132, 135); 
                  justify-content: o
            }
          h1{
              text-align: center;
          }
          .img1{
            align-items: center;
          }
        }
        
        
    </style>
</head>
<body>
       <h1>CSS Media Queries</h1>
       <p>The The background will change according to the width of viewport </p>
       <img class="img1" src="images/image3.jpg" alt="">
        <!-- <img class="img2" src="images/image4.jpg" alt="">
       <img class="img1" src="images/catjpg.avif"alt="">  -->
</body>
</html>
