<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            width:150px;
            height: 150px;
            border-radius: 20px;
            background-color: rgb(140, 115, 164);
            position: relative;
            /* animation name is user defined like""Movingbox,movingcar" */
            animation:movingbox;
            animation-duration: 4s;
            animation-iteration-count: infinite;
            animation-delay: 2s;
            animation-direction: alternate;
        }
        /* @keyframes keyword used for the animation  */
        @keyframes movingbox{
            0%{background-color:palevioletred;left:0px;top:0px}
            25%{background-color:rgb(173, 85, 52);left: 300px;top:0px}
            50%{background-color: rgb(111, 186, 111);left:300px;top:300px}
            75%{background-color: rgb(113, 210, 210);left:0px;top:300px}
            100%{background-color:palevioletred;left:0px;top:0px}
        }
    </style>
</head>
<body>
      <div></div>
</body>
</html>
